<!doctype html>
<html lang="zh-Hans">
	<head>
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	</head>
	<body>
		<div><input id="component" type="checkbox" /> <span id="lblComponent"></span></div>
		<div><input id="track" type="checkbox" /> <span id="lblTrack"></span></div>
		<div><input id="pad" type="checkbox" /> <span id="lblPad"></span></div>
		<div><input id="via" type="checkbox" /> <span id="lblVia"></span></div>
		<div><input id="pour" type="checkbox" /> <span id="lblPour"></span></div>
		<div><input id="fill" type="checkbox" /> <span id="lblFill"></span></div>
		<div><input id="line" type="checkbox" /> <span id="lblLine"></span></div>
		<div><input id="text" type="checkbox" /> <span id="lblText"></span></div>
		<div style="padding-top: 8px">
			<button id="confirmBtn" onclick="getStatus()"></button>
			<button id="cancelBtn" onclick="eda.sys_IFrame.closeIFrame('deletePrimitivesDialogForPCB')"></button>
		</div>
		<script>
			var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
			function t(tag) {
				if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag);
				return tag;
			}

			document.title = t('Delete Primitives');
			document.getElementById('lblComponent').textContent = t('Component');
			document.getElementById('lblTrack').textContent = t('Track');
			document.getElementById('lblPad').textContent = t('Pad');
			document.getElementById('lblVia').textContent = t('Via');
			document.getElementById('lblPour').textContent = t('Pour');
			document.getElementById('lblFill').textContent = t('Fill');
			document.getElementById('lblLine').textContent = t('Line');
			document.getElementById('lblText').textContent = t('Text');
			document.getElementById('confirmBtn').textContent = t('Confirm');
			document.getElementById('cancelBtn').textContent = t('Cancel');

			async function getStatus() {
				const componentChecked = document.getElementById('component').checked;
				const trackChecked = document.getElementById('track').checked;
				const padChecked = document.getElementById('pad').checked;
				const viaChecked = document.getElementById('via').checked;
				const pourChecked = document.getElementById('pour').checked;
				const fillChecked = document.getElementById('fill').checked;
				const lineChecked = document.getElementById('line').checked;
				const textChecked = document.getElementById('text').checked;
				if (componentChecked) {
					const allItems = await eda.pcb_PrimitiveComponent.getAll();
					await eda.pcb_PrimitiveComponent.delete(allItems);
				}
				if (trackChecked) {
					const allItemsForLine = await eda.pcb_PrimitiveLine.getAll();
					await eda.pcb_PrimitiveLine.delete(allItemsForLine);
					const allItemsForArc = await eda.pcb_PrimitiveArc.getAll();
					await eda.pcb_PrimitiveArc.delete(allItemsForArc);
				}
				if (padChecked) {
					const allItems = await eda.pcb_PrimitivePad.getAll();
					await eda.pcb_PrimitivePad.delete(allItems);
				}
				if (viaChecked) {
					const allItems = await eda.pcb_PrimitiveVia.getAll();
					await eda.pcb_PrimitiveVia.delete(allItems);
				}
				if (pourChecked) {
					const allItems = await eda.pcb_PrimitivePour.getAll();
					await eda.pcb_PrimitivePour.delete(allItems);
				}
				if (fillChecked) {
					const allItems = (await eda.pcb_PrimitiveFill.getAll())?.filter((item) => item.getState_Net() !== null);
					await eda.pcb_PrimitiveFill.delete(allItems);
				}
				if (lineChecked) {
					const allItems = (await eda.pcb_PrimitivePolyline.getAll())?.filter((item) => item.getState_Layer() !== 11);
					await eda.pcb_PrimitivePolyline.delete(allItems);
				}
				if (textChecked) {
					const allItems = await eda.pcb_PrimitiveString.getAll();
					await eda.pcb_PrimitiveString.delete(allItems);
				}
				eda.sys_IFrame.closeIFrame('deletePrimitivesDialogForPCB');
			}
		</script>
	</body>
</html>
