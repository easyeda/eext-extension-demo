<!doctype html>
<html lang="zh-Hans">
	<head>
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	</head>
	<body>
		<div><span id="lblPropName"></span> <input id="propName" placeholder="designator" /></div>
		<div><span id="lblPropValue"></span> <input id="propValue" placeholder="R1" /></div>
		<div style="padding-top: 8px">
			<button id="submitBtn"></button>
			<button id="cancelBtn" onclick="eda.sys_IFrame.closeIFrame('batchAddComponentForPCB')"></button>
		</div>
		<script>
			var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
			function t(tag) {
				if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag);
				return tag;
			}

			document.title = t('Batch Add Component Attributes');
			document.getElementById('lblPropName').textContent = t('Property Name:');
			document.getElementById('lblPropValue').textContent = t('Property Value:');
			document.getElementById('submitBtn').textContent = t('Confirm');
			document.getElementById('cancelBtn').textContent = t('Cancel');

			document.getElementById('submitBtn').addEventListener('click', async () => {
				const propName = document.getElementById('propName').value.trim();
				let propValue = document.getElementById('propValue').value.trim();
				if (!propName || !propValue) {
					eda.sys_Message.showToastMessage(t('Property name and value cannot be empty!'));
					return;
				}
				if (
					propValue.toLowerCase() === 'true' ||
					propValue.toLowerCase() === 'yes' ||
					propValue.toLowerCase() === 'false' ||
					propValue.toLowerCase() === 'no'
				) {
					if (propValue.toLowerCase() === 'true' || propValue.toLowerCase() === 'yes') {
						propValue = true;
					} else {
						propValue = false;
					}
				}
				if (propName === 'layer') {
					propValue = Number(propValue);
				}
				const basicProp = [
					'layer',
					'x',
					'y',
					'rotation',
					'primitiveLock',
					'addIntoBom',
					'designator',
					'name',
					'uniqueId',
					'manufacturer',
					'manufacturerId',
					'supplier',
					'supplierId',
				];
				let property;
				if (basicProp.includes(propName)) {
					property = {
						[propName]: propValue,
					};
				} else {
					property = {
						'otherProperty': {
							[propName]: propValue,
						},
					};
				}

				const allComponents = await eda.pcb_PrimitiveComponent.getAll();
				for (const component of allComponents) {
					const primitiveId = component.getState_PrimitiveId();
					await eda.pcb_PrimitiveComponent.modify(primitiveId, property);
				}
			});
		</script>
	</body>
</html>
